<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>데이터 센터 클라우드</title>
<style>
  :root {
    --bg: #0f1419; --panel: #171e26; --panel2: #1e2730; --border: #2a343f;
    --text: #e6edf3; --muted: #8b98a5; --accent: #4493f8; --accent2: #2ea043;
    --skill: #bc8cff; --raw: #4493f8; --skeleton: #39c5cf; --danger: #f85149; --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "Segoe UI", "Malgun Gothic", system-ui, sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.5; }
  a { color: var(--accent); text-decoration: none; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 24px; }

  header { display: flex; align-items: center; gap: 14px; margin-bottom: 8px; }
  header h1 { font-size: 22px; font-weight: 700; }
  header .logo { width: 38px; height: 38px; border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), var(--skill));
    display: grid; place-items: center; font-size: 20px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 22px; }

  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 22px; }
  .stat { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat .num { font-size: 24px; font-weight: 700; }
  .stat .lbl { color: var(--muted); font-size: 12px; margin-top: 2px; }

  .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 18px; }
  .toolbar input[type=text], .toolbar select {
    background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    padding: 9px 12px; border-radius: 8px; font-size: 14px; outline: none; }
  .toolbar input[type=text] { flex: 1; min-width: 200px; }
  .toolbar input:focus, .toolbar select:focus { border-color: var(--accent); }
  .btn { background: var(--accent); color: #fff; border: none; padding: 9px 16px;
    border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn:hover { filter: brightness(1.1); }
  .btn.secondary { background: var(--panel2); border: 1px solid var(--border); color: var(--text); }
  .seg { display: flex; background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
  .seg button { background: none; border: none; color: var(--muted); padding: 9px 14px; cursor: pointer; font-size: 13px; }
  .seg button.active { background: var(--accent); color: #fff; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; display: flex; flex-direction: column; gap: 10px; transition: border-color .15s; }
  .card:hover { border-color: var(--accent); }
  .card .top { display: flex; align-items: flex-start; gap: 10px; }
  .card .ficon { width: 40px; height: 40px; border-radius: 8px; background: var(--panel2);
    display: grid; place-items: center; font-size: 18px; flex-shrink: 0; }
  .card .title { font-weight: 600; font-size: 15px; word-break: break-word; }
  .card .meta { color: var(--muted); font-size: 12px; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }
  .badge.raw { background: rgba(68,147,248,.15); color: var(--raw); }
  .badge.skill { background: rgba(188,140,255,.15); color: var(--skill); }
  .badge.skeleton { background: rgba(57,197,207,.15); color: var(--skeleton); }
  .badge.hid { background: rgba(240,136,62,.15); color: #f0883e; }
  .chkline { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text); cursor: pointer; }
  .chkline input { width: 16px; height: 16px; accent-color: #f0883e; }
  .tags { display: flex; flex-wrap: wrap; gap: 5px; }
  .tag { font-size: 11px; background: var(--panel2); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 6px; color: var(--muted); cursor: pointer; }
  .tag:hover { color: var(--text); border-color: var(--accent); }
  .desc { font-size: 13px; color: var(--muted); white-space: pre-wrap; word-break: break-word; }
  .card .actions { display: flex; gap: 6px; margin-top: auto; padding-top: 6px; }
  .card .actions button { flex: 1; background: var(--panel2); border: 1px solid var(--border);
    color: var(--text); padding: 7px; border-radius: 7px; font-size: 12px; cursor: pointer; }
  .card .actions button:hover { border-color: var(--accent); }
  .card .actions button.del:hover { border-color: var(--danger); color: var(--danger); }

  .empty { text-align: center; color: var(--muted); padding: 60px 20px; }
  .empty .big { font-size: 40px; margin-bottom: 12px; }

  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none;
    align-items: center; justify-content: center; padding: 20px; z-index: 50; }
  .overlay.show { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; padding: 24px; }
  .modal h2 { font-size: 18px; margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  .field input[type=text], .field textarea, .field select {
    width: 100%; background: var(--panel2); border: 1px solid var(--border); color: var(--text);
    padding: 10px 12px; border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; }
  .field textarea { resize: vertical; min-height: 70px; }
  .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
  .dropzone { border: 2px dashed var(--border); border-radius: 10px; padding: 26px; text-align: center;
    color: var(--muted); cursor: pointer; transition: .15s; }
  .dropzone.over { border-color: var(--accent); background: rgba(68,147,248,.06); color: var(--text); }
  .filelist { margin-top: 10px; font-size: 13px; }
  .filelist .f { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--border); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
  .progress { height: 6px; background: var(--panel2); border-radius: 4px; overflow: hidden; margin-top: 12px; display: none; }
  .progress.show { display: block; }
  .progress .bar { height: 100%; width: 0; background: var(--accent); transition: width .2s; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--panel2); border: 1px solid var(--border); padding: 12px 20px; border-radius: 10px;
    font-size: 14px; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 100; }
  .toast.show { opacity: 1; }
  .toast.err { border-color: var(--danger); color: var(--danger); }

  /* 활동 로그 */
  .logtable { width: 100%; border-collapse: collapse; font-size: 13px; }
  .logtable th, .logtable td { padding: 7px 10px; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
  .logtable th { color: var(--muted); font-weight: 600; font-size: 12px; position: sticky; top: 0; background: var(--panel); }
  .logtable td.detail { white-space: normal; word-break: break-all; max-width: 260px; }
  .act { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; background: var(--panel2); }
  .act.visit { color: var(--accent); } .act.upload { color: var(--accent2); }
  .act.download, .act.preview { color: var(--skill); }
  .act.delete, .act.login_fail { color: var(--danger); }
  .logsum { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .logsum .chip { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 12px; font-size: 12px; }
  .logsum .chip b { font-size: 13px; }
  .logsum .chip .sub2 { color: var(--muted); }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">🗄️</div>
    <div>
      <h1>Shindong Data Center</h1>
    </div>
    <a href="/logout" class="btn secondary" style="margin-left:auto;text-decoration:none">로그아웃</a>
  </header>
  <div class="subtitle">RAW 데이터(excel · pdf · docx 등) 와 Claude로 생성된 skill을 한곳에 아카이빙합니다.</div>

  <div class="stats" id="stats"></div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="제목 · 설명 · 태그 · 파일명 검색...">
    <div class="seg" id="catSeg">
      <button data-cat="" class="active">전체</button>
      <button data-cat="raw">RAW</button>
      <button data-cat="skill">Skill</button>
      <button data-cat="skeleton">Skeleton</button>
    </div>
    <select id="sort">
      <option value="new">최신순</option>
      <option value="old">오래된순</option>
      <option value="name">이름순</option>
      <option value="size">용량순</option>
    </select>
    <button class="btn secondary" id="logBtn">📊 로그</button>
    <button class="btn" id="uploadBtn">＋ 업로드</button>
  </div>

  <div id="list"></div>
</div>

<!-- 업로드 모달 -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">자료 업로드</h2>
    <div class="field">
      <div class="dropzone" id="dropzone">
        📁 파일을 끌어다 놓거나 클릭해서 선택<br><span style="font-size:12px">(여러 개 선택 가능)</span>
      </div>
      <input type="file" id="fileInput" multiple style="display:none">
      <div class="filelist" id="filelist"></div>
    </div>
    <div class="field">
      <label>분류</label>
      <select id="mCategory">
        <option value="raw">RAW 데이터</option>
        <option value="skill">Skill (Claude 생성)</option>
        <option value="skeleton">Skeleton (앱 뼈대)</option>
      </select>
    </div>
    <div class="field">
      <label>제목 <span style="font-size:11px">(비우면 파일명 사용 · 다중 업로드 시 무시)</span></label>
      <input type="text" id="mTitle" placeholder="자료 제목">
    </div>
    <div class="field">
      <label>태그 <span style="font-size:11px">(쉼표로 구분)</span></label>
      <input type="text" id="mTags" placeholder="예) 분석, 2026, 매출">
    </div>
    <div class="field">
      <label>설명</label>
      <textarea id="mDesc" placeholder="간단한 설명 (선택)"></textarea>
    </div>
    <div class="field" id="mHiddenWrap" style="display:none">
      <label class="chkline"><input type="checkbox" id="mHidden"> 🔒 숨김 — 관리자만 볼 수 있음</label>
    </div>
    <div class="progress" id="progress"><div class="bar" id="progressBar"></div></div>
    <div class="modal-actions">
      <button class="btn secondary" id="cancelBtn">취소</button>
      <button class="btn" id="saveBtn">업로드</button>
    </div>
  </div>
</div>

<!-- 편집 모달 -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h2>자료 편집</h2>
    <input type="hidden" id="eId">
    <div class="field"><label>분류</label>
      <select id="eCategory"><option value="raw">RAW 데이터</option><option value="skill">Skill (Claude 생성)</option><option value="skeleton">Skeleton (앱 뼈대)</option></select>
    </div>
    <div class="field"><label>제목</label><input type="text" id="eTitle"></div>
    <div class="field"><label>태그 (쉼표 구분)</label><input type="text" id="eTags"></div>
    <div class="field"><label>설명</label><textarea id="eDesc"></textarea></div>
    <div class="field" id="eHiddenWrap" style="display:none">
      <label class="chkline"><input type="checkbox" id="eHidden"> 🔒 숨김 — 관리자만 볼 수 있음</label>
    </div>
    <div class="modal-actions">
      <button class="btn secondary" id="eCancelBtn">취소</button>
      <button class="btn" id="eSaveBtn">저장</button>
    </div>
  </div>
</div>

<!-- 활동 로그 모달 -->
<div class="overlay" id="logOverlay">
  <div class="modal" style="max-width:880px">
    <h2>📊 활동 로그 <span style="font-size:12px;color:var(--muted);font-weight:400">누가 접속·업로드·다운로드했는지 기록</span></h2>
    <div class="logsum" id="logSummary"></div>
    <div class="toolbar" style="margin-bottom:12px">
      <select id="logAction">
        <option value="">전체 활동</option>
        <option value="visit">방문</option>
        <option value="login">로그인</option>
        <option value="login_fail">로그인 실패</option>
        <option value="upload">업로드</option>
        <option value="download">다운로드</option>
        <option value="preview">미리보기</option>
        <option value="update">편집</option>
        <option value="delete">삭제</option>
      </select>
      <input type="text" id="logUser" placeholder="이름 필터" style="flex:0 0 140px;min-width:140px">
      <button class="btn secondary" id="logRefreshBtn">새로고침</button>
    </div>
    <div style="max-height:50vh;overflow:auto" id="logTable"></div>
    <div class="modal-actions">
      <button class="btn secondary" id="logCloseBtn">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
const api = (p, o) => fetch(p, o).then(r => r.json());
let curCat = "", files = [], isAdmin = false;

async function loadMe() {
  try {
    const me = await api("/api/me");
    isAdmin = me.role === "admin";
  } catch { isAdmin = false; }
  // 관리자 전용 UI: 숨김 체크박스, 활동 로그 버튼
  $("#mHiddenWrap").style.display = isAdmin ? "" : "none";
  $("#eHiddenWrap").style.display = isAdmin ? "" : "none";
  $("#logBtn").style.display = isAdmin ? "" : "none";
}

const EXT_ICON = {
  pdf:"📕", doc:"📘", docx:"📘", xls:"📗", xlsx:"📗", csv:"📊", ppt:"📙", pptx:"📙",
  txt:"📄", md:"📝", json:"🔧", py:"🐍", js:"📜", ts:"📜", sh:"⚙️", zip:"🗜️",
  png:"🖼️", jpg:"🖼️", jpeg:"🖼️", gif:"🖼️", webp:"🖼️", mp4:"🎬", mp3:"🎵",
};
const icon = (ext, cat) => cat === "skill" ? "✨" : cat === "skeleton" ? "🏗️" : (EXT_ICON[(ext||"").toLowerCase()] || "📦");
const CAT_LBL = { raw: "RAW", skill: "Skill", skeleton: "Skeleton" };

function toast(msg, isErr) {
  const t = $("#toast"); t.textContent = msg; t.className = "toast show" + (isErr ? " err" : "");
  setTimeout(() => t.className = "toast", 2500);
}

async function loadStats() {
  const s = await api("/api/stats");
  $("#stats").innerHTML = `
    <div class="stat"><div class="num">${s.total}</div><div class="lbl">전체 자료${isAdmin && s.hidden ? ` · 🔒 숨김 ${s.hidden}` : ""}</div></div>
    <div class="stat"><div class="num" style="color:var(--raw)">${s.raw}</div><div class="lbl">RAW 데이터</div></div>
    <div class="stat"><div class="num" style="color:var(--skill)">${s.skill}</div><div class="lbl">Skill</div></div>
    <div class="stat"><div class="num" style="color:var(--skeleton)">${s.skeleton || 0}</div><div class="lbl">Skeleton</div></div>
    <div class="stat"><div class="num">${s.total_size_human}</div><div class="lbl">총 용량</div></div>`;
}

async function loadList() {
  const q = new URLSearchParams({
    search: $("#search").value.trim(), category: curCat, sort: $("#sort").value,
  });
  const { items } = await api("/api/items?" + q);
  const list = $("#list");
  if (!items.length) {
    list.innerHTML = `<div class="empty"><div class="big">📭</div>아직 아카이빙된 자료가 없습니다.<br>우측 상단 <b>＋ 업로드</b> 버튼으로 추가하세요.</div>`;
    return;
  }
  list.innerHTML = `<div class="grid">` + items.map(it => `
    <div class="card">
      <div class="top">
        <div class="ficon">${icon(it.ext, it.category)}</div>
        <div style="flex:1;min-width:0">
          <div class="title">${esc(it.title)}</div>
          <div class="meta">${esc(it.filename)} · ${it.size_human} · ${fmtDate(it.created_at)}</div>
        </div>
        <span class="badge ${it.category}">${CAT_LBL[it.category] || "RAW"}</span>${it.hidden ? `<span class="badge hid">🔒 숨김</span>` : ""}
      </div>
      ${it.tag_list.length ? `<div class="tags">${it.tag_list.map(t => `<span class="tag" onclick="filterTag('${esc(t)}')">#${esc(t)}</span>`).join("")}</div>` : ""}
      ${it.description ? `<div class="desc">${esc(it.description)}</div>` : ""}
      <div class="actions">
        <button onclick="window.open('/api/preview/${it.id}','_blank')">미리보기</button>
        <button onclick="location.href='/api/download/${it.id}'">다운로드</button>
        <button onclick='openEdit(${JSON.stringify(it).replace(/'/g,"&#39;")})'>편집</button>
        <button class="del" onclick="delItem(${it.id})">삭제</button>
      </div>
    </div>`).join("") + `</div>`;
}

const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function fmtDate(iso) { try { return new Date(iso).toLocaleString("ko-KR",{year:"numeric",month:"2-digit",day:"2-digit"}); } catch { return iso; } }
function filterTag(t) { $("#search").value = t; refresh(); }
function refresh() { loadStats(); loadList(); }

// ---- 업로드 ----
function openUpload() { files = []; renderFiles(); $("#mTitle").value=""; $("#mTags").value=""; $("#mDesc").value=""; $("#mCategory").value="raw"; $("#mHidden").checked=false; $("#progress").className="progress"; $("#overlay").classList.add("show"); }
function closeUpload() { $("#overlay").classList.remove("show"); }
function renderFiles() {
  $("#filelist").innerHTML = files.map((f,i) => `<div class="f"><span>📎 ${esc(f.name)}</span><span style="color:var(--muted)">${(f.size/1024).toFixed(0)} KB</span></div>`).join("");
}
$("#dropzone").onclick = () => $("#fileInput").click();
$("#fileInput").onchange = e => { files = [...e.target.files]; renderFiles(); };
["dragover","dragenter"].forEach(ev => $("#dropzone").addEventListener(ev, e => { e.preventDefault(); $("#dropzone").classList.add("over"); }));
["dragleave","drop"].forEach(ev => $("#dropzone").addEventListener(ev, e => { e.preventDefault(); $("#dropzone").classList.remove("over"); }));
$("#dropzone").addEventListener("drop", e => { files = [...e.dataTransfer.files]; renderFiles(); });

function uploadOne(file, meta) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    const params = new URLSearchParams({
      title: meta.title || "", category: meta.category,
      tags: meta.tags || "", description: meta.description || "",
      hidden: meta.hidden ? "1" : "0",
    });
    xhr.open("POST", "/api/upload?" + params);
    xhr.setRequestHeader("X-Filename", encodeURIComponent(file.name));
    xhr.setRequestHeader("Content-Type", "application/octet-stream");
    xhr.upload.onprogress = e => { if (e.lengthComputable) meta.onprog(e.loaded / e.total); };
    xhr.onload = () => (xhr.status >= 200 && xhr.status < 300) ? resolve() : reject(new Error("업로드 실패"));
    xhr.onerror = () => reject(new Error("네트워크 오류"));
    xhr.send(file);
  });
}

$("#saveBtn").onclick = async () => {
  if (!files.length) { toast("파일을 선택하세요.", true); return; }
  const meta = { category: $("#mCategory").value, tags: $("#mTags").value, description: $("#mDesc").value, hidden: isAdmin && $("#mHidden").checked };
  const single = files.length === 1;
  $("#progress").className = "progress show"; $("#saveBtn").disabled = true;
  try {
    for (let i = 0; i < files.length; i++) {
      await uploadOne(files[i], {
        ...meta, title: single ? $("#mTitle").value : "",
        onprog: p => { $("#progressBar").style.width = ((i + p) / files.length * 100) + "%"; },
      });
    }
    toast(`${files.length}개 업로드 완료`); closeUpload(); refresh();
  } catch (e) { toast(e.message, true); }
  finally { $("#saveBtn").disabled = false; }
};

// ---- 편집 ----
function openEdit(it) {
  $("#eId").value = it.id; $("#eCategory").value = it.category;
  $("#eTitle").value = it.title; $("#eTags").value = it.tags; $("#eDesc").value = it.description || "";
  $("#eHidden").checked = !!it.hidden;
  $("#editOverlay").classList.add("show");
}
$("#eSaveBtn").onclick = async () => {
  const id = $("#eId").value;
  const params = new URLSearchParams({
    title: $("#eTitle").value, category: $("#eCategory").value,
    tags: $("#eTags").value, description: $("#eDesc").value,
  });
  if (isAdmin) params.set("hidden", $("#eHidden").checked ? "1" : "0");
  await fetch("/api/update/" + id + "?" + params, { method: "POST" });
  $("#editOverlay").classList.remove("show"); toast("저장되었습니다."); refresh();
};

async function delItem(id) {
  if (!confirm("이 자료를 삭제할까요? (파일도 함께 삭제됩니다)")) return;
  await fetch("/api/items/" + id, { method: "DELETE" });
  toast("삭제되었습니다."); refresh();
}

// ---- 활동 로그 ----
const ACT_LBL = { login:"로그인", login_fail:"로그인 실패", visit:"방문", upload:"업로드",
  download:"다운로드", preview:"미리보기", update:"편집", delete:"삭제", logout:"로그아웃" };
const fmtDT = iso => { try { return new Date(iso).toLocaleString("ko-KR",
  {month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"}); } catch { return iso; } };

async function loadLogs() {
  const q = new URLSearchParams({
    action: $("#logAction").value, user: $("#logUser").value.trim(), limit: 300,
  });
  const d = await api("/api/logs?" + q);
  $("#logSummary").innerHTML = d.summary.map(s => `
    <div class="chip"><b>${esc(s.user || "?")}</b>
      <span class="sub2"> · 방문 ${s.visits} · 업로드 ${s.uploads} · 다운로드 ${s.downloads}<br>마지막 활동 ${fmtDT(s.last_seen)}</span>
    </div>`).join("") +
    (d.login_fails ? `<div class="chip" style="border-color:var(--danger)"><b style="color:var(--danger)">로그인 실패 ${d.login_fails}회</b></div>` : "");
  if (!d.logs.length) {
    $("#logTable").innerHTML = `<div class="empty">기록이 없습니다.</div>`;
    return;
  }
  $("#logTable").innerHTML = `<table class="logtable">
    <tr><th>시간</th><th>이름</th><th>활동</th><th>대상</th><th>IP</th></tr>` +
    d.logs.map(l => `<tr>
      <td>${fmtDT(l.ts)}</td>
      <td><b>${esc(l.user || "?")}</b></td>
      <td><span class="act ${l.action}">${ACT_LBL[l.action] || esc(l.action)}</span></td>
      <td class="detail">${esc(l.detail || "")}</td>
      <td style="color:var(--muted)">${esc(l.ip || "")}</td>
    </tr>`).join("") + `</table>`;
}
$("#logBtn").onclick = () => { $("#logOverlay").classList.add("show"); loadLogs(); };
$("#logCloseBtn").onclick = () => $("#logOverlay").classList.remove("show");
$("#logOverlay").onclick = e => { if (e.target === $("#logOverlay")) $("#logOverlay").classList.remove("show"); };
$("#logRefreshBtn").onclick = loadLogs;
$("#logAction").onchange = loadLogs;
let lt; $("#logUser").oninput = () => { clearTimeout(lt); lt = setTimeout(loadLogs, 300); };

// ---- 이벤트 ----
$("#uploadBtn").onclick = openUpload;
$("#cancelBtn").onclick = closeUpload;
$("#eCancelBtn").onclick = () => $("#editOverlay").classList.remove("show");
$("#overlay").onclick = e => { if (e.target === $("#overlay")) closeUpload(); };
$("#editOverlay").onclick = e => { if (e.target === $("#editOverlay")) $("#editOverlay").classList.remove("show"); };
$("#sort").onchange = loadList;
let st; $("#search").oninput = () => { clearTimeout(st); st = setTimeout(loadList, 250); };
$("#catSeg").querySelectorAll("button").forEach(b => b.onclick = () => {
  $("#catSeg").querySelector(".active").classList.remove("active");
  b.classList.add("active"); curCat = b.dataset.cat; loadList();
});

loadMe().then(refresh);
</script>
</body>
</html>
