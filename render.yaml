# Render Blueprint — Shindong Data Center
# Render 대시보드 > Blueprints > 이 저장소 연결 시 자동 적용됩니다.
services:
  - type: web
    name: shindong-data-center        # → https://shindong-data-center.onrender.com
    runtime: python
    plan: free                        # 무료 플랜 (신용카드 불필요)
    buildCommand: ""                  # 외부 의존성 없음 (표준 라이브러리만)
    startCommand: python server.py
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: DC_PASSWORD
        sync: false                   # 대시보드에서 직접 비밀번호 입력 (Git에 저장 안 됨)
    # 참고: 무료 플랜은 영구 디스크가 없어 재시작/재배포 시 업로드 파일이 초기화됩니다.
    # 파일을 영구 보존하려면 plan:starter(유료) + 아래 disk 블록을 사용하세요.
    #   envVars 에 DATA_DIR=/data 추가 후:
    # disk:
    #   name: data
    #   mountPath: /data
    #   sizeGB: 1
